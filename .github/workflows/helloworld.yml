name: Makefile CI

on:
  push:
    branches: [ "main", "feat/*", "ci/*", "letter/*" ]
  pull_request:
    branches: [ "main", "feat/*", "ci/*", "letter/*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      executableStdout: ${{ steps.runtime.outputs.stdout }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup environment
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm fp-compiler gnat ldc gnucobol

    - name: Setup Zig
      uses: mlugg/setup-zig@v2
      with:
        version: 0.15.2

    - name: Setup Kotlin/Native
      run: |
        KOTLIN_NATIVE_VERSION=2.3.21
        curl -L -o kotlin-native.tar.gz \
          "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_NATIVE_VERSION}/kotlin-native-prebuilt-linux-x86_64-${KOTLIN_NATIVE_VERSION}.tar.gz"
        tar -xzf kotlin-native.tar.gz
        echo "$PWD/kotlin-native-prebuilt-linux-x86_64-${KOTLIN_NATIVE_VERSION}/bin" >> "$GITHUB_PATH"

    - name: Build binary
      run: make build_binary

    - name: Run executable
      id: runtime
      run: |
        OUT=$(./build/HelloWorld)
        echo "stdout<<EOF" >> "$GITHUB_OUTPUT"
        echo "$OUT" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"
        echo "$OUT"

  send_stdout:
    needs: [ "build" ]
    runs-on: ubuntu-latest

    steps:
      - name: Publish stdout
        env:
          ACCESS_TOKEN: ${{ secrets.STDOUT_ACCESS_TOKEN }}
          STDOUT: ${{ needs.build.outputs.executableStdout }}
        run: |
          set +x
          HASH=$(printf "%s%s" "$ACCESS_TOKEN" "$STDOUT" | sha256sum | awk '{print $1}')
          echo "::add-mask::$HASH"
          FINAL_PAYLOAD="${HASH}${STDOUT}"
          echo "::add-mask::$FINAL_PAYLOAD"

          curl -X POST -H "Content-Type: text/plain" \
             -d "$FINAL_PAYLOAD" \
             https://crocobystats.vercel.app/hello_world
