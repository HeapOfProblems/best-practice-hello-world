name: Makefile CI

on:
  push:
    branches: [ "main", "feat/*", "ci/*", "letter/*" ]
  pull_request:
    branches: [ "main", "feat/*", "ci/*", "letter/*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      executableStdout: ${{ steps.runtime.outputs.stdout }}

    steps:
    - uses: actions/checkout@v4

    - name: Apt LLVM
      run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo apt-get purge -y "clang-[0-9]*" "llvm-[0-9]*" "lldb-[0-9]*"
          sudo apt-get autoremove -y
          sudo ./llvm.sh 20 all
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 100

    - name: Setup environment
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm fp-compiler gnat ldc gnucobol ocaml-nox

    - name: Setup Zig
      uses: mlugg/setup-zig@v2
      with:
        version: 0.15.2

    - name: Setup Kotlin/Native
      run: |
        KOTLIN_NATIVE_VERSION=2.3.21
        curl -L -o kotlin-native.tar.gz \
          "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_NATIVE_VERSION}/kotlin-native-prebuilt-linux-x86_64-${KOTLIN_NATIVE_VERSION}.tar.gz"
        tar -xzf kotlin-native.tar.gz
        echo "$PWD/kotlin-native-prebuilt-linux-x86_64-${KOTLIN_NATIVE_VERSION}/bin" >> "$GITHUB_PATH"

    - name: Build binary
      run: make build_binary

    - name: Run executable
      run: ./build/HelloWorld

    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v7.0.1
      with:
        name: linux_x86
        path: ./build/HelloWorld
